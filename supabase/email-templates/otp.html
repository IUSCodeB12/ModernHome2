<!--
  ModernHome auth email — paste this into Supabase → Authentication →
  Email Templates, into BOTH "Magic Link" and "Confirm signup".
  Uses {{ .Token }} (the 6-digit code the /login screen asks for) and keeps
  {{ .ConfirmationURL }} as a one-tap fallback.
  Suggested subject: Your ModernHome sign-in code
-->
<div style="background:#f4f1ec;margin:0;padding:32px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table role="presentation" width="440" cellpadding="0" cellspacing="0" style="width:440px;max-width:92%;background:#ffffff;border:1px solid #e7e1d8;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px 0;">
              <div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;color:#1a1712;">ModernHome</div>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 40px 0;">
              <h1 style="margin:0;font-size:22px;font-weight:600;color:#1a1712;">Your sign-in code</h1>
              <p style="margin:8px 0 0;font-size:14px;line-height:1.6;color:#6b6459;">
                Enter this code to finish signing in. It expires in 60 minutes.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px;">
              <div style="background:#faf7f1;border:1px solid #e7e1d8;border-radius:12px;padding:22px;text-align:center;">
                <div style="font-size:34px;font-weight:700;letter-spacing:12px;color:#1a1712;font-family:'SF Mono',Menlo,Consolas,monospace;">{{ .Token }}</div>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 4px;">
              <p style="margin:0;font-size:13px;line-height:1.6;color:#8a8175;">
                Prefer one tap? <a href="{{ .ConfirmationURL }}" style="color:#b8862f;text-decoration:none;font-weight:600;">Sign in here</a>.
                If you didn&rsquo;t request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px;border-top:1px solid #f0ece5;">
              <p style="margin:0;font-size:12px;color:#b5ac9f;">ModernHome &middot; Quality home improvement, priced online.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
